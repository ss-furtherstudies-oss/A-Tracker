version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atracker_db
    environment:
      POSTGRES_USER: atracker
      POSTGRES_PASSWORD: atrackerpassword
      POSTGRES_DB: atracker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
